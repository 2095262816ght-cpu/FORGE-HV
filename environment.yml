# FORGE-HV conda 环境定义
# 一键创建: conda env create -f environment.yml
# 激活:     conda activate forge-hv
# 删除:     conda env remove -n forge-hv
name: forge-hv
channels:
  - conda-forge
  - pytorch
dependencies:
  - python=3.11
  # 科学计算
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  # 机器学习
  - scikit-learn>=1.0
  - xgboost>=2.0
  - joblib>=1.3
  # 绘图
  - matplotlib>=3.5
  - seaborn>=0.12
  # Web 后端
  - flask>=3.0
  - flask-cors>=4.0
  # Excel 读写
  - openpyxl>=3.0
  # 系统监控
  - psutil>=5.9
  # 深度学习（CPU 版；GPU 用户改用 pytorch::pytorch=2.* with cuda）
  - pytorch>=2.0
  - cpuonly
  # pip 专属包（conda 里没有的）
  - pip
  - pip:
      - flask-cors>=4.0
